<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Caution Tape Vex V5 Push Back Skills Match Timer</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
<center>
	<br>
	<br>
	<img src="CautionTapeLogo.png" alt="">
	<h1>Vex V5 Push Back Skills Match Timer</h1>
	<br>
	<h1 id="sPeriodDisplay">Skills:</h1>
	<br>
	<h1 id="sTimerDisplay">1:00</h1>
	<br>
	<br>
	<br>
	<button class="btn btn-success" id="startS" onclick="startS()">Start Match</button>
	<button class="btn btn-danger" id="sRTS" onclick="sRTS()">Stop and Reset</button>
	<br>
	<br>
	<br>
	<button class="btn btn-info" id="smTimer" onclick="tmTimer()">Teamwork Match Timer</button>
	<button class="btn btn-info" id="tmCalculator" onclick="tmCalculator()">Teamwork Match Score Calculator</button>
	<button class="btn btn-info" id="smCalculator" onclick="smCalculator()">Skills Match Score Calculator</button>
	<br>
	<br>
</center>
</body>
<script src="script.js"></script>
</html>
